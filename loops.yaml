# A loop is a schedule plus a command. Nothing else.
# Omit `schedule` to make a loop on-demand only (`loops run <name>`).

loops:
  hello:
    schedule: "*/5 * * * *"   # every 5 minutes
    run: echo "hello from the $LOOP_NAME loop at $(date)"

  kylie-reviews:
    schedule: "*/30 * * * *"   # bounded DM + tracked-MR pass every 30 minutes
    run: ./scripts/kylie-review-loop.sh
    cwd: ../review-loop-lab
